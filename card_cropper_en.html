<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Grid Splitter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family:'Inter',system-ui,sans-serif; overflow:hidden; }

        .preview-wrapper {
            width:100%; max-width:1050px; height:100%;
            background: repeating-conic-gradient(#334155 0% 25%,#1e293b 0% 50%) 0 0/20px 20px;
            border-radius:16px;
            overflow:hidden;
            box-shadow:0 25px 50px -12px rgb(0 0 0/.45);
            position:relative;
            cursor:grab;
        }
        #preview-canvas {
            image-rendering:crisp-edges;
            transform-origin:0 0;
            position:absolute; top:0; left:0;
        }
        #selection-overlays {
            position:absolute; top:0; left:0;
            width:0; height:0;
            transform-origin:0 0;
            pointer-events:none;
            z-index:30;
        }
        .tile-overlay {
            position:absolute;
            border:3px solid #22c55e;
            background:rgba(134,239,172,.22);
            pointer-events:none;
            border-radius:var(--tile-radius);
        }
        .drop-zone-active { border-color:#22c55e !important; background:rgba(34,197,94,.08) !important; }
        .rot-btn {
            width:32px; height:32px; border-radius:8px;
            display:flex; align-items:center; justify-content:center;
            background:#334155; border:1px solid #475569;
            cursor:pointer; font-size:17px; transition:background .12s;
        }
        .rot-btn:hover { background:#475569; }
        input[type=range] { height:4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
<div style="display:flex; flex-direction:column; height:100vh;">

    <div class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center justify-between flex-shrink-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-xl">🃏</div>
            <h1 class="text-xl font-semibold">Card Grid Splitter</h1>
        </div>
        <button onclick="exportToZIP()" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded-2xl font-semibold flex items-center gap-2 text-sm">
            📦 Download ZIP
            <span id="selected-count" class="bg-white/20 px-3 py-0.5 rounded-xl text-xs">0 Cards</span>
        </button>
    </div>

    <div style="display:flex; flex:1; min-height:0;">

        <div style="width:320px; flex-shrink:0; overflow-y:auto;" class="bg-slate-900 border-r border-slate-800 p-4 space-y-5">

            <div id="upload-box" onclick="document.getElementById('file-upload').click()"
                 class="border-2 border-dashed border-slate-600 hover:border-blue-400 rounded-2xl p-6 text-center cursor-pointer transition-colors">
                <div class="text-5xl mb-2">📸</div>
                <div class="text-sm font-medium">Upload Image<br><span class="text-slate-400 text-xs">Click or Drag &amp; Drop</span></div>
                <input type="file" id="file-upload" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
            </div>

            <div>
                <label class="block text-xs text-slate-400 mb-1">Set Prefix</label>
                <input id="prefix-input" type="text" value="MyCardSet"
                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm"
                       oninput="currentPrefix=this.value">
            </div>

            <div>
                <div class="text-xs uppercase tracking-widest text-slate-400 mb-2">Crop (%)</div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs text-slate-400">Left</label>
                        <div class="flex gap-1 items-center mt-0.5">
                            <input type="number" id="crop-left-num" value="0" min="0" max="100" step="0.1"
                                   class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs" oninput="updateCropFromNumber()">
                            <input type="range" id="crop-left" min="0" max="100" value="0" step="0.1" oninput="updateCrop()" class="flex-1 accent-emerald-500">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs text-slate-400">Right</label>
                        <div class="flex gap-1 items-center mt-0.5">
                            <input type="number" id="crop-right-num" value="0" min="0" max="100" step="0.1"
                                   class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs" oninput="updateCropFromNumber()">
                            <input type="range" id="crop-right" min="0" max="100" value="0" step="0.1" oninput="updateCrop()" class="flex-1 accent-emerald-500">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs text-slate-400">Top</label>
                        <div class="flex gap-1 items-center mt-0.5">
                            <input type="number" id="crop-top-num" value="0" min="0" max="100" step="0.1"
                                   class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs" oninput="updateCropFromNumber()">
                            <input type="range" id="crop-top" min="0" max="100" value="0" step="0.1" oninput="updateCrop()" class="flex-1 accent-emerald-500">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs text-slate-400">Bottom</label>
                        <div class="flex gap-1 items-center mt-0.5">
                            <input type="number" id="crop-bottom-num" value="0" min="0" max="100" step="0.1"
                                   class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs" oninput="updateCropFromNumber()">
                            <input type="range" id="crop-bottom" min="0" max="100" value="0" step="0.1" oninput="updateCrop()" class="flex-1 accent-emerald-500">
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-2">
                    <div class="text-xs uppercase tracking-widest text-slate-400">Image Settings</div>
                    <button onclick="resetImageParams()" class="px-2 py-1 bg-slate-700 hover:bg-slate-600 rounded text-[10px] font-semibold text-slate-200 transition-colors">Reset Values</button>
                </div>
                <div class="space-y-2">
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-400 w-18">Brightness</span>
                        <input type="range" id="brightness" min="0" max="200" value="100" oninput="syncNum('brightness');liveUpdate()" class="flex-1 accent-emerald-500">
                        <input type="number" id="brightness-num" value="100" min="0" max="200" class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs" oninput="updateFromNumber('brightness')">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-400 w-18">Contrast</span>
                        <input type="range" id="contrast" min="0" max="200" value="100" oninput="syncNum('contrast');liveUpdate()" class="flex-1 accent-emerald-500">
                        <input type="number" id="contrast-num" value="100" min="0" max="200" class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs" oninput="updateFromNumber('contrast')">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-400 w-18">Saturation</span>
                        <input type="range" id="saturation" min="0" max="200" value="100" oninput="syncNum('saturation');liveUpdate()" class="flex-1 accent-emerald-500">
                        <input type="number" id="saturation-num" value="100" min="0" max="200" class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs" oninput="updateFromNumber('saturation')">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-400 w-18">Hue</span>
                        <input type="range" id="hue" min="-180" max="180" value="0" oninput="syncNum('hue');liveUpdate()" class="flex-1 accent-emerald-500">
                        <input type="number" id="hue-num" value="0" min="-180" max="180" class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs" oninput="updateFromNumber('hue')">
                    </div>
                </div>
            </div>

            <div>
                <div class="text-xs uppercase tracking-widest text-slate-400 mb-2">Card Size &amp; Corners</div>
                <div class="space-y-2">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-xs text-slate-400 block mb-1">Width (mm)</label>
                            <input type="number" id="card-width-mm" value="63" min="1" max="200" step="0.5"
                                   class="w-full bg-slate-800 border border-slate-700 rounded-xl px-2 py-2 text-center text-sm" oninput="updateCardSize()">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 block mb-1">Height (mm)</label>
                            <input type="number" id="card-height-mm" value="88" min="1" max="300" step="0.5"
                                   class="w-full bg-slate-800 border border-slate-700 rounded-xl px-2 py-2 text-center text-sm" oninput="updateCardSize()">
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-400 w-18">Radius (mm)</span>
                        <input type="range" id="corner-radius-mm" min="0" max="15" value="3" step="0.5"
                               oninput="syncNum('corner-radius-mm');updatePreview()" class="flex-1 accent-emerald-500">
                        <input type="number" id="corner-radius-mm-num" value="3" min="0" max="15" step="0.5"
                               class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs"
                               oninput="document.getElementById('corner-radius-mm').value=this.value;updatePreview()">
                    </div>
                    <div id="radius-info" class="text-xs text-slate-600 text-right h-3"></div>
                </div>
            </div>

            <div>
                <div class="text-xs uppercase tracking-widest text-slate-400 mb-2">Viewport Lines</div>
                <div class="space-y-2">
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-400 w-18">Grid (px)</span>
                        <input type="range" id="line-grid" min="0.5" max="10" value="2" step="0.5"
                               oninput="syncNum('line-grid');updatePreview()" class="flex-1 accent-red-500">
                        <input type="number" id="line-grid-num" value="2" min="0.5" max="10" step="0.5"
                               class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs"
                               oninput="document.getElementById('line-grid').value=this.value;updatePreview()">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-400 w-18">Crop (px)</span>
                        <input type="range" id="line-crop" min="0.5" max="10" value="3" step="0.5"
                               oninput="syncNum('line-crop');updatePreview()" class="flex-1 accent-emerald-500">
                        <input type="number" id="line-crop-num" value="3" min="0.5" max="10" step="0.5"
                               class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs"
                               oninput="document.getElementById('line-crop').value=this.value;updatePreview()">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-400 w-18">Selection (px)</span>
                        <input type="range" id="line-sel" min="0.5" max="10" value="2" step="0.5"
                               oninput="syncNum('line-sel');renderSelectionOverlays()" class="flex-1 accent-emerald-500">
                        <input type="number" id="line-sel-num" value="2" min="0.5" max="10" step="0.5"
                               class="w-12 bg-slate-800 border border-slate-700 rounded-lg px-1 py-1 text-center text-xs"
                               oninput="document.getElementById('line-sel').value=this.value;renderSelectionOverlays()">
                    </div>
                </div>
            </div>

        </div><div style="flex:1; display:flex; flex-direction:column; min-height:0; min-width:0;">

            <div class="px-5 py-2.5 bg-slate-900 border-b border-slate-800 flex items-center justify-between flex-shrink-0">
                <div id="current-scan-name" class="font-medium text-sm truncate max-w-xs text-slate-300">No scan loaded</div>
                <div class="flex gap-2 items-center flex-shrink-0">
                    <div class="flex items-center gap-1 border-r border-slate-700 pr-3 mr-1">
                        <button class="rot-btn" title="90° counter-clockwise" onclick="rotateImage(-90)">↺</button>
                        <span id="rotation-label" class="text-xs text-slate-500 w-7 text-center">0°</span>
                        <button class="rot-btn" title="90° clockwise" onclick="rotateImage(90)">↻</button>
                    </div>
                    <span class="text-slate-400 text-sm">Cols</span>
                    <input id="cols" type="number" value="4" min="1" oninput="updateGrid()"
                           class="w-12 bg-slate-800 text-center border border-slate-700 rounded-xl py-1.5 font-mono text-sm">
                    <span class="text-slate-400 text-sm">Rows</span>
                    <input id="rows" type="number" value="3" min="1" oninput="updateGrid()"
                           class="w-12 bg-slate-800 text-center border border-slate-700 rounded-xl py-1.5 font-mono text-sm">
                    <button onclick="selectAll()"   class="px-3 py-1.5 bg-emerald-700 hover:bg-emerald-600 rounded-xl text-xs">Select All</button>
                    <button onclick="deselectAll()" class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-xl text-xs">Deselect All</button>
                    <button onclick="resetView()"   class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-xl text-xs">Auto Fit</button>
                </div>
            </div>

            <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:20px; background:#020617; min-height:0;">
                <div id="preview-wrapper" class="preview-wrapper"
                     onmousedown="startPan(event)"
                     onwheel="zoomWithWheel(event)"
                     ondrop="handleDrop(event)"
                     ondragover="handleDragOver(event)"
                     ondragleave="handleDragLeave(event)">
                    <canvas id="preview-canvas"></canvas>
                    <div id="selection-overlays"></div>
                    <div id="drop-hint" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;user-select:none;color:#475569;">
                        <div style="font-size:64px;margin-bottom:12px;">🖼️</div>
                        <div style="font-size:15px;font-weight:500;">Drop image here or upload on the left</div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 border-t border-slate-800 flex-shrink-0">
                <div class="px-5 py-2 border-b border-slate-700 flex justify-between items-center">
                    <span class="text-sm font-medium">Select Cards</span>
                    <span id="tiles-count" class="text-emerald-400 font-mono text-sm">0 / 0</span>
                </div>
                <div id="tiles-container" style="display:grid; gap:6px; padding:8px 12px; max-height: 200px; overflow-y: auto;"></div>
            </div>

        </div></div></div><script>
    let currentScan   = null;
    let currentPrefix = 'MyCardSet';
    let zoom  = 1, panX = 0, panY = 0;
    let isPanning = false, lastX = 0, lastY = 0;

    // ── Drag & Drop sidebar ──────────────────────────────────────
    const uploadBox = document.getElementById('upload-box');
    uploadBox.addEventListener('dragover',  e => { e.preventDefault(); uploadBox.classList.add('drop-zone-active'); });
    uploadBox.addEventListener('dragleave', ()  => uploadBox.classList.remove('drop-zone-active'));
    uploadBox.addEventListener('drop', e => {
        e.preventDefault(); uploadBox.classList.remove('drop-zone-active');
        const f = e.dataTransfer.files[0];
        if (f && f.type.startsWith('image/')) processFile(f);
    });

    function handleFileSelect(e) { if (e.target.files[0]) processFile(e.target.files[0]); }
    function handleDragOver(e)  { e.preventDefault(); document.getElementById('preview-wrapper').classList.add('drop-zone-active'); }
    function handleDragLeave()  { document.getElementById('preview-wrapper').classList.remove('drop-zone-active'); }
    function handleDrop(e) {
        e.preventDefault(); document.getElementById('preview-wrapper').classList.remove('drop-zone-active');
        const f = e.dataTransfer.files[0];
        if (f && f.type.startsWith('image/')) processFile(f);
    }

    // ── processFile ──────────────────────────────────────────────
    function processFile(file) {
        const img = new Image();
        img.onload = () => {
            const prev = currentScan || {}; // Save previous values for persistence
            
            currentScan = {
                name: file.name, originalImage: img, 
                rotation: prev.rotation !== undefined ? prev.rotation : 0,
                cols: parseInt(document.getElementById('cols').value) || 4,
                rows: parseInt(document.getElementById('rows').value) || 3,
                brightness: prev.brightness !== undefined ? prev.brightness : 100,
                contrast: prev.contrast !== undefined ? prev.contrast : 100,
                saturation: prev.saturation !== undefined ? prev.saturation : 100,
                hue: prev.hue !== undefined ? prev.hue : 0,
                cropLeft: prev.cropLeft !== undefined ? prev.cropLeft : 0,
                cropTop: prev.cropTop !== undefined ? prev.cropTop : 0,
                cropRight: prev.cropRight !== undefined ? prev.cropRight : 0,
                cropBottom: prev.cropBottom !== undefined ? prev.cropBottom : 0,
                cardWidthMM:  parseFloat(document.getElementById('card-width-mm').value)  || 63,
                cardHeightMM: parseFloat(document.getElementById('card-height-mm').value) || 88,
                selectedTiles: new Set()
            };
            document.getElementById('current-scan-name').textContent = file.name;
            document.getElementById('drop-hint').style.display = 'none';
            syncAllControls();
            
            // Prepare canvas first
            const canvas = document.getElementById('preview-canvas');
            canvas.width = img.width;
            canvas.height = img.height;

            // Then reset viewport (calculates Zoom & Pan)
            resetView(); 
            // Then draw contents
            updatePreview();
            renderTilesSelection();
        };
        img.src = URL.createObjectURL(file);
    }

    // ── Reset Image Params ───────────────────────────────────────
    function resetImageParams() {
        if (!currentScan) return;
        currentScan.brightness = 100;
        currentScan.contrast = 100;
        currentScan.saturation = 100;
        currentScan.hue = 0;
        currentScan.cropLeft = 0;
        currentScan.cropTop = 0;
        currentScan.cropRight = 0;
        currentScan.cropBottom = 0;
        currentScan.rotation = 0;
        
        syncAllControls();
        updatePreview();
        resetView();
    }

    // ── Rotation ─────────────────────────────────────────────────
    function rotateImage(deg) {
        if (!currentScan) return;
        currentScan.rotation = ((currentScan.rotation + deg) % 360 + 360) % 360;
        document.getElementById('rotation-label').textContent = currentScan.rotation + '°';
        updatePreview();
        resetView();
    }

    function getTransformedCanvas() {
        const img  = currentScan.originalImage;
        const rot  = currentScan.rotation;
        const swap = rot === 90 || rot === 270;
        const srcW = img.width, srcH = img.height;
        const outW = swap ? srcH : srcW;
        const outH = swap ? srcW : srcH;
        const tmp  = document.createElement('canvas');
        tmp.width = outW; tmp.height = outH;
        const ctx = tmp.getContext('2d');
        const {brightness:br,contrast:co,saturation:sa,hue:hu} = currentScan;
        ctx.filter = `brightness(${br}%) contrast(${co}%) saturate(${sa}%) hue-rotate(${hu}deg)`;
        ctx.save();
        ctx.translate(outW/2, outH/2);
        ctx.rotate(rot * Math.PI / 180);
        ctx.drawImage(img, -srcW/2, -srcH/2);
        ctx.restore();
        ctx.filter = 'none';
        return tmp;
    }

    // ── Sync controls ─────────────────────────────────────────────
    function syncAllControls() {
        if (!currentScan) return;
        ['left','top','right','bottom'].forEach(d => {
            const k = `crop${d[0].toUpperCase()+d.slice(1)}`;
            document.getElementById(`crop-${d}`).value = currentScan[k];
            document.getElementById(`crop-${d}-num`).value = currentScan[k];
        });
        ['brightness','contrast','saturation','hue'].forEach(k => {
            document.getElementById(k).value = currentScan[k];
            document.getElementById(k+'-num').value = currentScan[k];
        });
        document.getElementById('cols').value = currentScan.cols;
        document.getElementById('rows').value = currentScan.rows;
        document.getElementById('card-width-mm').value  = currentScan.cardWidthMM;
        document.getElementById('card-height-mm').value = currentScan.cardHeightMM;
        document.getElementById('rotation-label').textContent = (currentScan.rotation||0)+'°';
    }

    function updateCrop() {
        if (!currentScan) return;
        ['left','top','right','bottom'].forEach(d => {
            const k = `crop${d[0].toUpperCase()+d.slice(1)}`;
            currentScan[k] = parseFloat(document.getElementById(`crop-${d}`).value)||0;
            document.getElementById(`crop-${d}-num`).value = currentScan[k];
        });
        updatePreview(); renderSelectionOverlays();
    }
    function updateCropFromNumber() {
        if (!currentScan) return;
        ['left','top','right','bottom'].forEach(d => {
            const k = `crop${d[0].toUpperCase()+d.slice(1)}`;
            currentScan[k] = parseFloat(document.getElementById(`crop-${d}-num`).value)||0;
            document.getElementById(`crop-${d}`).value = currentScan[k];
        });
        updatePreview(); renderSelectionOverlays();
    }

    function syncNum(key) {
        const n = document.getElementById(key+'-num');
        if (n) n.value = document.getElementById(key).value;
    }
    function liveUpdate() {
        if (!currentScan) return;
        currentScan.brightness = parseFloat(document.getElementById('brightness').value)||100;
        currentScan.contrast   = parseFloat(document.getElementById('contrast').value)||100;
        currentScan.saturation = parseFloat(document.getElementById('saturation').value)||100;
        currentScan.hue        = parseFloat(document.getElementById('hue').value)||0;
        updatePreview();
    }
    function updateFromNumber(key) {
        if (!currentScan) return;
        const v = parseFloat(document.getElementById(key+'-num').value);
        currentScan[key] = isNaN(v) ? (key==='hue'?0:100) : v;
        document.getElementById(key).value = currentScan[key];
        updatePreview();
    }

    function updateGrid() {
        if (!currentScan) return;
        currentScan.cols = Math.max(1, parseInt(document.getElementById('cols').value)||4);
        currentScan.rows = Math.max(1, parseInt(document.getElementById('rows').value)||3);
        const total = currentScan.cols * currentScan.rows;
        currentScan.selectedTiles.forEach(i => { if (i>=total) currentScan.selectedTiles.delete(i); });
        updatePreview(); renderTilesSelection();
    }
    function updateCardSize() {
        if (!currentScan) return;
        currentScan.cardWidthMM  = parseFloat(document.getElementById('card-width-mm').value)||63;
        currentScan.cardHeightMM = parseFloat(document.getElementById('card-height-mm').value)||88;
        updatePreview(); renderTilesSelection();
    }

    function selectAll() {
        if (!currentScan) return;
        for (let i=0; i<currentScan.cols*currentScan.rows; i++) currentScan.selectedTiles.add(i);
        renderTilesSelection(); renderSelectionOverlays();
    }
    function deselectAll() {
        if (!currentScan) return;
        currentScan.selectedTiles.clear();
        renderTilesSelection(); renderSelectionOverlays();
    }
    function renderTilesSelection() {
        const container = document.getElementById('tiles-container');
        container.innerHTML = '';
        if (!currentScan) { updateCounters(0,0); return; }
        container.style.gridTemplateColumns = `repeat(${currentScan.cols},minmax(0,1fr))`;
        const ratio = (currentScan.cardWidthMM||63)/(currentScan.cardHeightMM||88);
        const total = currentScan.cols*currentScan.rows;
        for (let i=0; i<total; i++) {
            const sel = currentScan.selectedTiles.has(i);
            const el  = document.createElement('div');
            el.style.cssText = `aspect-ratio:${ratio};border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;border:2px solid;transition:border-color .1s,background .1s;user-select:none;`;
            const paint = s => {
                el.style.borderColor = s?'#22c55e':'#475569';
                el.style.background  = s?'rgba(6,78,59,.65)':'#1e293b';
                el.style.color       = s?'#6ee7b7':'#94a3b8';
            };
            paint(sel);
            el.textContent = i+1;
            el.addEventListener('mouseenter', ()=>{ if (!currentScan.selectedTiles.has(i)) el.style.borderColor='#94a3b8'; });
            el.addEventListener('mouseleave', ()=>{ if (!currentScan.selectedTiles.has(i)) el.style.borderColor='#475569'; });
            el.onclick = () => {
                currentScan.selectedTiles.has(i) ? currentScan.selectedTiles.delete(i) : currentScan.selectedTiles.add(i);
                renderTilesSelection(); renderSelectionOverlays();
            };
            container.appendChild(el);
        }
        updateCounters(currentScan.selectedTiles.size, total);
    }
    function updateCounters(sel,total) {
        document.getElementById('tiles-count').textContent    = `${sel} / ${total}`;
        document.getElementById('selected-count').textContent = sel===0?'0 Cards':`${sel} / ${total} Cards`;
    }

    function roundRectPath(ctx, x, y, w, h, r) {
        r = Math.min(r, w/2, h/2);
        if (r <= 0) { ctx.rect(x,y,w,h); return; }
        ctx.moveTo(x+r, y);
        ctx.lineTo(x+w-r, y);   ctx.arcTo(x+w,y,   x+w,y+r,   r);
        ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
        ctx.lineTo(x+r, y+h);   ctx.arcTo(x,  y+h, x,  y+h-r, r);
        ctx.lineTo(x,   y+r);   ctx.arcTo(x,  y,   x+r,y,     r);
        ctx.closePath();
    }

    function updatePreview() {
        if (!currentScan) return;
        const canvas = document.getElementById('preview-canvas');
        const ctx    = canvas.getContext('2d');

        const src = getTransformedCanvas();
        canvas.width  = src.width;
        canvas.height = src.height;
        ctx.drawImage(src, 0, 0);

        const W = canvas.width, H = canvas.height;
        const l = W * currentScan.cropLeft   / 100;
        const t = H * currentScan.cropTop    / 100;
        const r = W * currentScan.cropRight  / 100;
        const b = H * currentScan.cropBottom / 100;
        const effW = W-l-r, effH = H-t-b;
        const tileW = effW / currentScan.cols;
        const tileH = effH / currentScan.rows;

        const radiusMM    = parseFloat(document.getElementById('corner-radius-mm').value)||0;
        const cardWidthMM = currentScan.cardWidthMM||63;
        const pixelRadius = (radiusMM / cardWidthMM) * tileW;

        if (pixelRadius > 0.5) {
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            for (let row=0; row<currentScan.rows; row++) {
                for (let col=0; col<currentScan.cols; col++) {
                    const tx = l+col*tileW, ty = t+row*tileH;
                    ctx.save();
                    ctx.beginPath(); ctx.rect(tx,ty,tileW,tileH); ctx.clip();
                    ctx.beginPath(); ctx.rect(tx,ty,tileW,tileH);
                    roundRectPath(ctx, tx,ty,tileW,tileH, pixelRadius);
                    ctx.fill('evenodd');
                    ctx.restore();
                }
            }
            ctx.restore();
        }

        const gridThick = (parseFloat(document.getElementById('line-grid').value)||2) / zoom;
        const cropThick = (parseFloat(document.getElementById('line-crop').value)||3) / zoom;

        ctx.strokeStyle='#22c55e'; ctx.lineWidth=cropThick;
        ctx.setLineDash([cropThick*5, cropThick*2.5]);
        ctx.strokeRect(l,t,effW,effH);
        ctx.setLineDash([]);

        ctx.strokeStyle='#ef4444'; ctx.lineWidth=gridThick;
        for (let i=1; i<currentScan.cols; i++) {
            ctx.beginPath(); ctx.moveTo(l+i*tileW,t); ctx.lineTo(l+i*tileW,H-b); ctx.stroke();
        }
        for (let i=1; i<currentScan.rows; i++) {
            ctx.beginPath(); ctx.moveTo(l,t+i*tileH); ctx.lineTo(W-r,t+i*tileH); ctx.stroke();
        }

        const infoEl = document.getElementById('radius-info');
        if (infoEl) infoEl.textContent = pixelRadius>0 ? `≈ ${Math.round(pixelRadius)} px at current resolution` : '';

        renderSelectionOverlays();
    }

    function renderSelectionOverlays() {
        const container = document.getElementById('selection-overlays');
        container.innerHTML = '';
        if (!currentScan) return;
        const canvas = document.getElementById('preview-canvas');
        const W = canvas.width, H = canvas.height;
        if (!W||!H) return;

        container.style.width  = W+'px';
        container.style.height = H+'px';

        const l = W * currentScan.cropLeft   / 100;
        const t = H * currentScan.cropTop    / 100;
        const r = W * currentScan.cropRight  / 100;
        const b = H * currentScan.cropBottom / 100;
        const tileW = (W-l-r)/currentScan.cols;
        const tileH = (H-t-b)/currentScan.rows;

        const radiusMM    = parseFloat(document.getElementById('corner-radius-mm').value)||0;
        const pixelRadius = Math.round((radiusMM/(currentScan.cardWidthMM||63))*tileW);
        const borderPx    = (parseFloat(document.getElementById('line-sel').value)||2) / zoom;

        currentScan.selectedTiles.forEach(i => {
            const col=i%currentScan.cols, row=Math.floor(i/currentScan.cols);
            const div=document.createElement('div');
            div.className='tile-overlay';
            div.style.left       = (l+col*tileW)+'px';
            div.style.top        = (t+row*tileH)+'px';
            div.style.width      = tileW+'px';
            div.style.height     = tileH+'px';
            div.style.borderWidth= borderPx+'px';
            div.style.setProperty('--tile-radius', pixelRadius+'px');
            container.appendChild(div);
        });
    }

    // ── Zoom & Pan Fix ────────────────────────────────────────────
    function startPan(e) {
        if (e.button!==0) return;
        isPanning=true; lastX=e.clientX; lastY=e.clientY;
        document.getElementById('preview-wrapper').style.cursor='grabbing';
    }
    document.addEventListener('mousemove', e => {
        if (!isPanning) return;
        panX+=e.clientX-lastX; panY+=e.clientY-lastY;
        lastX=e.clientX; lastY=e.clientY;
        applyTransform();
    });
    document.addEventListener('mouseup', () => {
        isPanning=false;
        const w=document.getElementById('preview-wrapper');
        if (w) w.style.cursor='grab';
    });
    function zoomWithWheel(e) {
        if (!currentScan) return;
        e.preventDefault();
        const factor = e.deltaY<0?1.15:0.87;
        const wrapper=document.getElementById('preview-wrapper');
        const canvas =document.getElementById('preview-canvas');
        const fitZ   = Math.min(wrapper.clientWidth/canvas.width, wrapper.clientHeight/canvas.height);
        
        const oldZoom = zoom;
        zoom = Math.max(fitZ*0.08, Math.min(zoom*factor, 10));

        // Zoom to mouse position (optional, improves handling)
        const rect = wrapper.getBoundingClientRect();
        const mouseX = e.clientX - rect.left - panX;
        const mouseY = e.clientY - rect.top - panY;
        panX -= mouseX * (zoom / oldZoom - 1);
        panY -= mouseY * (zoom / oldZoom - 1);

        applyTransform();
    }
    function applyTransform() {
        const canvas = document.getElementById('preview-canvas');
        const overlays = document.getElementById('selection-overlays');
        const transformStr = `translate(${panX}px,${panY}px) scale(${zoom})`;
        
        canvas.style.transform = transformStr;
        if (overlays) overlays.style.transform = transformStr;
        
        // Redraw lines to adjust for zoom
        updatePreview(); 
    }
    function resetView() {
        if (!currentScan) return;
        const wrapper = document.getElementById('preview-wrapper');
        const canvas  = document.getElementById('preview-canvas');
        
        // Calculate Fit-Zoom
        zoom = Math.min(
            (wrapper.clientWidth * 0.9) / canvas.width, 
            (wrapper.clientHeight * 0.9) / canvas.height
        );
        
        // Center image
        panX = (wrapper.clientWidth - canvas.width * zoom) / 2;
        panY = (wrapper.clientHeight - canvas.height * zoom) / 2;
        
        applyTransform();
    }

    // ── Export ────────────────────────────────────────────────────
    async function exportToZIP() {
        if (!currentScan||currentScan.selectedTiles.size===0) {
            alert('Please select at least one card!'); return;
        }
        const btn=document.querySelector('button[onclick="exportToZIP()"]');
        btn.disabled=true; btn.textContent='⏳ Exporting…';

        const src  = getTransformedCanvas();
        const sw   = src.width, sh = src.height;
        const l    = sw * currentScan.cropLeft   / 100;
        const t    = sh * currentScan.cropTop    / 100;
        const r    = sw * currentScan.cropRight  / 100;
        const b    = sh * currentScan.cropBottom / 100;
        const effW = sw-l-r, effH = sh-t-b;
        const tileW = effW/currentScan.cols;
        const tileH = effH/currentScan.rows;

        const radiusMM    = parseFloat(document.getElementById('corner-radius-mm').value)||0;
        const pixelRadius = (radiusMM/(currentScan.cardWidthMM||63)) * tileW;

        const zip=new JSZip();
        
        // Text summary in the ZIP
        let summaryText = `Export Summary\n`;
        summaryText += `========================\n\n`;
        summaryText += `Filename: ${currentScan.name}\n`;
        summaryText += `Set Prefix: ${currentPrefix}\n\n`;
        summaryText += `--- Image Parameters ---\n`;
        summaryText += `Brightness: ${currentScan.brightness}%\n`;
        summaryText += `Contrast: ${currentScan.contrast}%\n`;
        summaryText += `Saturation: ${currentScan.saturation}%\n`;
        summaryText += `Hue: ${currentScan.hue}°\n`;
        summaryText += `Rotation: ${currentScan.rotation}°\n\n`;
        summaryText += `--- Crop ---\n`;
        summaryText += `Left: ${currentScan.cropLeft}%\n`;
        summaryText += `Right: ${currentScan.cropRight}%\n`;
        summaryText += `Top: ${currentScan.cropTop}%\n`;
        summaryText += `Bottom: ${currentScan.cropBottom}%\n\n`;
        summaryText += `--- Grid & Format ---\n`;
        summaryText += `Card Format: ${currentScan.cardWidthMM}mm x ${currentScan.cardHeightMM}mm\n`;
        summaryText += `Grid: ${currentScan.cols} Cols, ${currentScan.rows} Rows\n`;
        summaryText += `Exported Cards: ${currentScan.selectedTiles.size}\n`;

        zip.file("summary.txt", summaryText);

        const off=document.createElement('canvas');
        const ctx=off.getContext('2d');

        let idx=1;
        const sortedTiles = [...currentScan.selectedTiles].sort((a,b)=>a-b);
        for (const i of sortedTiles) {
            const col=i%currentScan.cols, row=Math.floor(i/currentScan.cols);
            const sx=l+col*tileW, sy=t+row*tileH;
            off.width =Math.round(tileW);
            off.height=Math.round(tileH);
            ctx.clearRect(0,0,off.width,off.height);

            if (pixelRadius>0.5) {
                ctx.save();
                ctx.beginPath();
                roundRectPath(ctx, 0, 0, off.width, off.height, pixelRadius);
                ctx.clip();
                ctx.drawImage(src, sx, sy, tileW, tileH, 0, 0, off.width, off.height);
                ctx.restore();
            } else {
                ctx.drawImage(src, sx, sy, tileW, tileH, 0, 0, off.width, off.height);
            }

            const blob=await new Promise(res=>off.toBlob(res,'image/png'));
            zip.file(`${currentPrefix}_${String(idx).padStart(3,'0')}.png`, blob);
            idx++;
        }

        const content=await zip.generateAsync({type:'blob'});
        const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(content),download:`${currentPrefix}_cards.zip`});
        a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href),5000);

        btn.disabled=false;
        btn.innerHTML=`📦 Download ZIP <span id="selected-count" class="bg-white/20 px-3 py-0.5 rounded-xl text-xs">${currentScan.selectedTiles.size} Cards</span>`;
    }

    window.onload=()=>console.log('%c✅ Card Grid Splitter Fix ready','color:#22c55e;font-weight:bold');
</script>
